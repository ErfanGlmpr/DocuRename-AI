services:
  postgres:
    image: postgres:15
    container_name: pdf_ai_postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: pdf_ai
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d pdf_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: pdf_ai_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: pdf_ai_minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-create-bucket:
    image: minio/mc:latest
    container_name: pdf_ai_minio_setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 minio minio123;
      /usr/bin/mc mb --ignore-existing myminio/documents;
      /usr/bin/mc anonymous set public myminio/documents;
      exit 0;
      "

  ollama:
    image: ollama/ollama:latest
    container_name: pdf_ai_ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    # Note: exec into the container and run `ollama pull gemma3:4b` to download a model.

  # ─── Phase 4: OCR Sidecar ───────────────────────────────────────────────
  # Python FastAPI microservice: pytesseract + pdf2image + poppler-utils.
  # Build with: docker compose build ocr-sidecar
  # Set OCR_ENABLED=true and OCR_SIDECAR_URL=http://ocr-sidecar:8080 in backend .env
  ocr-sidecar:
    build:
      context: ./ocr-sidecar
      dockerfile: Dockerfile
    container_name: pdf_ai_ocr_sidecar
    ports:
      - '8080:8080'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ─── Phase 4: ClamAV ─────────────────────────────────────────────────────
  # Antivirus daemon (clamd) — listens on TCP port 3310.
  # Set VIRUS_SCAN_ENABLED=true and CLAMAV_HOST=clamav in backend .env
  # Note: First startup downloads the virus definition database (~300 MB).
  #       Subsequent startups are fast.
  clamav:
    image: clamav/clamav:stable
    container_name: pdf_ai_clamav
    ports:
      - '3310:3310'
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "1"]
      interval: 30s
      timeout: 10s
      start_period: 120s   # First startup downloads virus definitions
      retries: 5

  # ─── Phase 5: Backend ──────────────────────────────────────────────────────
  # NestJS API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pdf_ai_backend
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      # Overrides for Docker network
      - DATABASE_URL=postgresql://app:app@postgres:5432/pdf_ai
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - S3_ENDPOINT=http://minio:9000
      - OLLAMA_BASE_URL=http://ollama:11434
      - OCR_SIDECAR_URL=http://ocr-sidecar:8080
      - CLAMAV_HOST=clamav
      - CORS_ORIGIN=http://localhost:3001
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Phase 5: Frontend ─────────────────────────────────────────────────────
  # Next.js React UI.
  # Set NEXT_PUBLIC_API_BASE_URL to point to the backend (e.g. http://localhost:3000)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pdf_ai_frontend
    ports:
      - '3001:3001'
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:3000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
  clamav_data:
