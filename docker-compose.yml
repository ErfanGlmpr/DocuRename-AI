version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: pdf_ai_postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: pdf_ai
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d pdf_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: pdf_ai_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: pdf_ai_minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-create-bucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 minio minio123;
      /usr/bin/mc mb --ignore-existing myminio/documents;
      /usr/bin/mc anonymous set public myminio/documents;
      exit 0;
      "

  ollama:
    image: ollama/ollama:latest
    container_name: pdf_ai_ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    # Note: You will need to manually exec into the container and run `ollama run llama3.1:8b` or pull the model.

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
