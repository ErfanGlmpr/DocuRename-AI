services:
  backend:
    build:
      context: ./backend
      target: builder
    command: npm run start:dev
    volumes:
      - ./backend:/app
      # Use named volume so the container uses its own Linux node_modules
      - backend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development

  frontend:
    build:
      context: ./frontend
      target: deps
    command: npm run dev
    volumes:
      - ./frontend:/app
      # Use named volumes to prevent host OS overriding container dependencies/builds
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    environment:
      - NODE_ENV=development

volumes:
  backend_node_modules:
  frontend_node_modules:
  frontend_next_cache:
